name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_RELEASE }}
        with:
          tagName: app-v__VERSION__
          releaseName: App v__VERSION__
          releaseBody: See the assets to download this version and install.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-flatpak:
    needs: publish-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: get app version
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: install flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: install flatpak runtime and SDK
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: download .deb from release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_RELEASE }}
        run: |
          gh release download "app-v${{ steps.version.outputs.version }}" \
            --pattern "*.deb" \
            --dir ./deb-download

      - name: compute sha256 and stamp manifest
        id: manifest
        run: |
          DEB_FILE=$(ls ./deb-download/*.deb | head -n1)
          DEB_NAME=$(basename "$DEB_FILE")
          SHA256=$(sha256sum "$DEB_FILE" | awk '{print $1}')
          echo "deb_name=$DEB_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

          # Copy the manifest template and stamp in the dynamic values
          cp flatpak/com.tpkee.foolhammer-mod-manager.yml /tmp/com.tpkee.foolhammer-mod-manager.yml
          sed -i "s|DEB_FILE_PLACEHOLDER|deb-download/${DEB_NAME}|g" /tmp/com.tpkee.foolhammer-mod-manager.yml
          sed -i "s|SHA256_PLACEHOLDER|${SHA256}|g" /tmp/com.tpkee.foolhammer-mod-manager.yml

      - name: build flatpak
        run: |
          flatpak-builder \
            --user \
            --install-deps-from=flathub \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            /tmp/com.tpkee.foolhammer-mod-manager.yml

          flatpak build-bundle \
            flatpak-repo \
            foolhammer-mod-manager_${{ steps.version.outputs.version }}.flatpak \
            com.tpkee.foolhammer-mod-manager

      - name: upload flatpak to release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_RELEASE }}
        run: |
          gh release upload "app-v${{ steps.version.outputs.version }}" \
            foolhammer-mod-manager_${{ steps.version.outputs.version }}.flatpak \
            --clobber
