name: build flatpak

on:
  workflow_run:
    workflows: [publish]
    types: [completed]
  workflow_dispatch:

jobs:
  build-flatpak:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Get version from tauri.conf.json ──────────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Download .deb from the GitHub release ─────────────────────────────
      - name: Download .deb from release
        run: |
          gh release download app-v${{ steps.version.outputs.version }} \
            --pattern "*.deb" \
            --dir deb-download
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_RELEASE }}

      # ── Flatpak tools ─────────────────────────────────────────────────────
      - name: Install Flatpak tools
        run: sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDK
        run: |
          flatpak install --user -y flathub \
            org.gnome.Platform//47 \
            org.gnome.Sdk//47

      # ── Generate manifest ─────────────────────────────────────────────────
      - name: Write Flatpak manifest
        run: |
          DEB_PATH=$(ls deb-download/*.deb | head -1)

          cat > com.tpkee.foolhammer-mod-manager.yaml <<EOF
          id: com.tpkee.foolhammer-mod-manager

          runtime: org.gnome.Platform
          runtime-version: '47'
          sdk: org.gnome.Sdk

          command: foolhammer-mod-manager
          finish-args:
            - --socket=wayland
            - --socket=fallback-x11
            - --device=dri
            - --share=ipc
            - --filesystem=home

          modules:
            - name: foolhammer-mod-manager
              buildsystem: simple
              sources:
                - type: file
                  path: $DEB_PATH
                  dest-filename: app.deb
              build-commands:
                - ar -x app.deb
                - tar -xf data.tar.gz
                - install -Dm755 usr/bin/foolhammer-mod-manager /app/bin/foolhammer-mod-manager
                - install -Dm644 usr/share/applications/foolhammer-mod-manager.desktop /app/share/applications/com.tpkee.foolhammer-mod-manager.desktop
                - install -Dm644 usr/share/icons/hicolor/32x32/apps/foolhammer-mod-manager.png /app/share/icons/hicolor/32x32/apps/com.tpkee.foolhammer-mod-manager.png
                - install -Dm644 usr/share/icons/hicolor/128x128/apps/foolhammer-mod-manager.png /app/share/icons/hicolor/128x128/apps/com.tpkee.foolhammer-mod-manager.png
                - install -Dm644 usr/share/icons/hicolor/256x256@2/apps/foolhammer-mod-manager.png /app/share/icons/hicolor/256x256/apps/com.tpkee.foolhammer-mod-manager.png
          EOF

      # ── Build & bundle ────────────────────────────────────────────────────
      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --repo=flatpak-repo \
            build-dir com.tpkee.foolhammer-mod-manager.yaml

      - name: Bundle into .flatpak
        run: |
          flatpak build-bundle \
            flatpak-repo \
            foolhammer-mod-manager.flatpak \
            com.tpkee.foolhammer-mod-manager

      # ── Upload to the existing release ────────────────────────────────────
      - name: Upload .flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ steps.version.outputs.version }}
          files: foolhammer-mod-manager.flatpak
          token: ${{ secrets.GH_PAT_RELEASE }}
