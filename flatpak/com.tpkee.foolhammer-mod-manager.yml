id: com.tpkee.foolhammer-mod-manager

runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: foolhammer-mod-manager
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=~/.local/share/foolhammer-mod-manager
  - --filesystem=~/.steam

modules:
  - name: foolhammer-mod-manager
    buildsystem: simple
    sources:
      - type: file
        path: DEB_FILE_PLACEHOLDER
        sha256: SHA256_PLACEHOLDER
    build-commands:
      - ar -x ${FLATPAK_BUILDER_BUILDDIR}/*.deb
      - tar -xf ${FLATPAK_BUILDER_BUILDDIR}/data.tar.gz -C ${FLATPAK_BUILDER_BUILDDIR}
      - install -Dm755 ${FLATPAK_BUILDER_BUILDDIR}/usr/bin/foolhammer-mod-manager /app/bin/foolhammer-mod-manager
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/usr/share/applications/foolhammer-mod-manager.desktop /app/share/applications/com.tpkee.foolhammer-mod-manager.desktop
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/usr/share/icons/hicolor/32x32/apps/foolhammer-mod-manager.png /app/share/icons/hicolor/32x32/apps/com.tpkee.foolhammer-mod-manager.png
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/usr/share/icons/hicolor/128x128/apps/foolhammer-mod-manager.png /app/share/icons/hicolor/128x128/apps/com.tpkee.foolhammer-mod-manager.png
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/usr/share/icons/hicolor/256x256@2/apps/foolhammer-mod-manager.png /app/share/icons/hicolor/256x256@2/apps/com.tpkee.foolhammer-mod-manager.png
